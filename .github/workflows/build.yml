name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --icon=repocloner.ico --name=RepoClonerApp repo_cloner.py

      - name: Upload Windows binary
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RepoClonerApp.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name=RepoClonerApp repo_cloner.py

      - name: Zip the .app bundle
        run: zip -r RepoClonerApp-mac.zip dist/RepoClonerApp.app

      - name: Upload Mac binary
        uses: softprops/action-gh-release@v2
        with:
          files: RepoClonerApp-mac.zip
